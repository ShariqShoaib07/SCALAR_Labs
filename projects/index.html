<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projects by Dr. Ali Murtaza.">
    <title>Projects - Dr. Ali Murtaza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="vignette"></div>

    <nav class="navbar">
        <div class="nav-brand">
            <a href="../"><span>Ali</span> Murtaza</a>
        </div>
        <ul class="nav-links">
            <li><a href="../">Home</a></li>
            <li><a href="../publications/">Publications</a></li>
            <li><a href="./" class="active">Projects</a></li>
            <li><a href="../videos/">Videos</a></li>
            <li><a href="../lab/">SCALAR Labs</a></li>
            <li><a href="../#contact">Contact</a></li>
        </ul>
    </nav>

    <section class="publications-page-header">
        <div class="container">
            <h1>Projects</h1>
            <p>Selected research projects from Dr. Ali Murtaza's group</p>
        </div>
    </section>

    <section class="publications-page-content">
        <div class="container">
            <div class="publications-list" id="projects-list"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 SCALAR Labs. All rights reserved by SCALAR Labs.</p>
        </div>
    </footer>

    <script src="../data/projects.js"></script>
    <script>
        const projectsRoot = document.getElementById('projects-list');

        window.projectsData.forEach((project) => {
            const links = Object.entries(project.links || {}).map(([label, url]) => {
                const text = label.charAt(0).toUpperCase() + label.slice(1);
                return `<a href="${url}" class="btn" target="_blank" rel="noopener noreferrer">${text}</a>`;
            }).join('');

            const technologies = (project.technologies || []).map((item) => `<span class="tech-chip">${item}</span>`).join('');

            projectsRoot.insertAdjacentHTML('beforeend', `
                <div class="publication-card">
                    <div class="publication-image">
                        <img src="../${project.thumbnail}" alt="${project.title} thumbnail">
                    </div>
                    <div class="publication-content">
                        <div class="venue-header">
                            <p class="venue">Project, ${project.year}</p>
                        </div>
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <div class="tech-chip-row">${technologies}</div>
                        <div class="publication-links">${links}</div>
                    </div>
                </div>
            `);
        });
    </script>
</body>

</html>
